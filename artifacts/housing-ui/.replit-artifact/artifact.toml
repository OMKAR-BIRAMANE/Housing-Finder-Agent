kind = "web"
previewPath = "/"
title = "Chicago Affordable Housing Finder"
version = "1.0.0"
id = "artifacts/housing-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20413

[services.development]
run = "pnpm --filter @workspace/housing-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/housing-ui", "run", "build" ]
publicDir = "artifacts/housing-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20413"
BASE_PATH = "/"
